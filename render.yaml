services:
  - type: web
    name: agromarkets-br-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/status
    plan: free
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 10000
      - key: SYNC_INTERVAL_MINUTES
        value: 5
      - key: DOLAR_FUTURO_CONTRACT_COUNT
        value: 3
      - key: PROVIDER_TIMEOUT_MS
        value: 8000
      - key: YAHOO_MIN_REQUEST_INTERVAL_MS
        value: 500
      - key: YAHOO_MAX_RETRIES
        value: 4
      - key: YAHOO_RETRY_BASE_DELAY_MS
        value: 1500
